name: Update Plugins

on:
  push:
    branches:
      - main
    paths:
      - '*/**'

jobs:
  update-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -v '^\.github/' | sed 's|/[^/]*$||' | sort -u | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0)) | unique')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed plugins: $CHANGED"

      - name: Bump versions and update registry
        env:
          CHANGED: ${{ steps.changed.outputs.changed }}
        run: |
          echo "CHANGED value: $CHANGED"
          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ] || [ "$CHANGED" = "[\"\"]" ]; then
            echo "No plugins changed, skipping"
            exit 0
          fi

          node << 'EOFNODE'
            const fs = require('fs');
            const { execSync } = require('child_process');

            const changedStr = process.env.CHANGED;
            console.log('Raw CHANGED:', changedStr);

            let changed;
            try {
              changed = JSON.parse(changedStr);
            } catch (e) {
              console.error('Failed to parse CHANGED:', e.message);
              process.exit(1);
            }

            console.log('Parsed changed plugins:', changed);

            if (!Array.isArray(changed) || changed.length === 0) {
              console.log('No plugins to update');
              process.exit(0);
            }

            changed.forEach(pluginId => {
              console.log('Processing plugin:', pluginId);
              const manifestPath = pluginId + '/manifest.json';
              if (!fs.existsSync(manifestPath)) {
                console.log('No manifest at', manifestPath);
                return;
              }

              const manifestContent = fs.readFileSync(manifestPath, 'utf8');
              const manifest = JSON.parse(manifestContent);
              const oldVersion = manifest.version;

              // Bump version
              const versionParts = oldVersion.split('.');
              const major = parseInt(versionParts[0]);
              const minor = parseInt(versionParts[1]);
              const patch = parseInt(versionParts[2]) + 1;
              const newVersion = major + '.' + minor + '.' + patch;
              manifest.version = newVersion;

              // Write updated manifest
              fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
              console.log('Bumped', pluginId, 'from', oldVersion, 'to', newVersion);

              // Stage manifest for commit
              try {
                execSync('git add "' + manifestPath + '"', { stdio: 'inherit' });
              } catch (e) {
                console.log('git add failed for', manifestPath);
              }
            });

            // Update registry.json
            let registry;
            try {
              registry = JSON.parse(fs.readFileSync('registry.json', 'utf8'));
            } catch (e) {
              console.log('Creating new registry');
              registry = { plugins: [] };
            }

            changed.forEach(pluginId => {
              const manifestPath = pluginId + '/manifest.json';
              if (!fs.existsSync(manifestPath)) return;

              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              const pluginIndex = registry.plugins.findIndex(p => p.id === pluginId);

              if (pluginIndex >= 0) {
                registry.plugins[pluginIndex].version = manifest.version;
                registry.plugins[pluginIndex].name = manifest.name;
                registry.plugins[pluginIndex].description = manifest.description;
                registry.plugins[pluginIndex].tags = manifest.tags || [];
                registry.plugins[pluginIndex].author = manifest.author;
                registry.plugins[pluginIndex].license = manifest.license;
                registry.plugins[pluginIndex].repository = manifest.repository;
                registry.plugins[pluginIndex].minNoctaliaVersion = manifest.minNoctaliaVersion;
              } else {
                registry.plugins.push({
                  id: manifest.id,
                  name: manifest.name,
                  version: manifest.version,
                  description: manifest.description,
                  tags: manifest.tags || [],
                  author: manifest.author,
                  license: manifest.license,
                  repository: manifest.repository,
                  minNoctaliaVersion: manifest.minNoctaliaVersion
                });
              }
              console.log('Updated registry for:', pluginId);
            });

            fs.writeFileSync('registry.json', JSON.stringify(registry, null, 2) + '\n');
            console.log('Registry updated successfully');
          EOFNODE

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump versions and update registry"
            git push
          fi